name: PR testing

on:
  pull_request:
    branches: [ main ]

jobs:
  check-toolchain-changes:
    runs-on: ubuntu-latest
    outputs:
      toolchain_changed: ${{ steps.check.outputs.changed }}
    permissions:
        contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for toolchain changes
        id: check
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only origin/${{ github.base_ref }} HEAD > changed_files.txt
          else
            git diff --name-only ${{ github.event.before }} ${{ github.event.after }} > changed_files.txt
          fi

          if grep -q "infrastructure/toolchain/" changed_files.txt; then
            echo "Toolchain files changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No toolchain files changed"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build-and-test:
    needs: check-toolchain-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Setup environment
        id: env
        uses: ./.github/actions/env-setup
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local toolchain image (if toolchain changed)
        if: needs.check-toolchain-changes.outputs.toolchain_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/toolchain/Dockerfile
          push: false
          load: true
          tags: local/dmp_toolchain:latest
          cache-from: type=registry,ref=ghcr.io/${{ steps.env.outputs.owner }}/dmp_toolchain:cache

      - name: Determine container image
        id: container
        run: |
          if [ "${{ needs.check-toolchain-changes.outputs.toolchain_changed }}" == "true" ]; then
            echo "image=local/dmp_toolchain:latest" >> $GITHUB_OUTPUT
          else
            echo "image=ghcr.io/${{ steps.env.outputs.owner }}/dmp_toolchain:stable" >> $GITHUB_OUTPUT
          fi

      - name: Pull existing toolchain image (if using existing)
        if: needs.check-toolchain-changes.outputs.toolchain_changed == 'false'
        run: |
          docker pull ghcr.io/${{ steps.env.outputs.owner }}/dmp_toolchain:stable

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: vcpkg-binary-cache
          key: vcpkg-binary-${{ hashFiles('vcpkg.json') }}-x64-linux
          restore-keys: |
            vcpkg-binary-

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache-cache
          key: ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ github.ref }}-
            ccache-

      - name: Build
        run: |
          mkdir -p vcpkg-binary-cache ccache-cache
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ${{ github.workspace }}/vcpkg-binary-cache:/root/.cache/vcpkg/archives \
            -v ${{ github.workspace }}/ccache-cache:/root/.cache/ccache \
            -e VCPKG_BINARY_SOURCES="clear;files,/root/.cache/vcpkg/archives,readwrite" \
            -e CCACHE_DIR=/root/.cache/ccache \
            -e CCACHE_MAXSIZE=500M \
            -w /workspace \
            ${{ steps.container.outputs.image }} \
            bash -c "
              ln -sfn /opt/vcpkg vcpkg &&
              cmake --preset release &&
              cmake --build --preset release -- -j\$(nproc)
            "

      - name: Unit testing
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ${{ steps.container.outputs.image }} \
            bash -c "ctest --preset release -L unit --output-on-failure"

      - name: Integration testing
        run: |
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e POSTGRES_HOST=localhost \
            -e POSTGRES_PORT=5433 \
            -e POSTGRES_DB=test_db \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_password \
            ${{ steps.container.outputs.image }} \
            bash -c "ctest --preset release -L integration --output-on-failure"

  # This allows testing the new toolchain in PRs before merging
  push-pr-toolchain:
    needs: [ check-toolchain-changes, build-and-test ]
    if: |
      github.event_name == 'pull_request' &&
      needs.check-toolchain-changes.outputs.toolchain_changed == 'true' &&
      needs.build-and-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup environment
        id: env
        uses: ./.github/actions/env-setup

      - name: Build and push PR toolchain
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/toolchain/Dockerfile
          push: true
          tags: ghcr.io/${{steps.env.outputs.owner }}/dmp_toolchain:pr-${{ github.event.number }}
          cache-from: type=registry,ref=ghcr.io/${{ steps.env.outputs.owner }}/dmp_toolchain:cache
